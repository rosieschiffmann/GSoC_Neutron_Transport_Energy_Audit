title: Parallel Neutron Transport Energy Audit
description: 'This project uses CodeCarbon to measure the energy consumption and emissions
  produced by a Python Monte Carlo neutron transport simulation, on a Lenovo ThinkPad
  laptop with an AMD Ryzen 7 Pro CPU. Neutrons are simulated with parallel computation, where
  each distinct slab thickness is computed simulataneously across 15 threads.
  '

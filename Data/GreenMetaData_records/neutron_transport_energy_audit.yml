title: Neutron Transport Energy Audit
description: This project uses CodeCarbon to measure the energy consumption and emissions
  produced by a Python Monte Carlo neutron transport simulation, on a Lenovo ThinkPad
  laptop with an AMD Ryzen 7 Pro CPU. In this run, each different slab thickness is
  simulated consecutively, without parallel computation. This means the overall power
  draw is lower, but the duration of computation is overall much higher than when
  parallel computation is used.
keywords:
- MonteCarlo
- CodeCarbon
